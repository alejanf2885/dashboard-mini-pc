services:
  dashboard:
    build: .
    pid: host
    privileged: true
    ports:
      - "3500:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - dashboard-data:/app/data
      - /sys/class/powercap:/sys/class/powercap:ro
    restart: unless-stopped

volumes:
  dashboard-data:

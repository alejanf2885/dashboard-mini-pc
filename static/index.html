<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Homelab Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
  --bg:#0a0a0b;
  --card:#141416;
  --border:#242428;
  --txt:#eaeaea;
  --muted:#8a8a93;
  --blue:#4d8dff;
  --green:#3ecf8e;
  --orange:#f0a838;
  --red:#e05555;
}

body{
  margin:0;
  font-family:Inter,system-ui;
  background:var(--bg);
  color:var(--txt);
}

.wrap{max-width:1200px;margin:auto;padding:20px}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.status{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:var(--muted);
}

.dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--green);
  animation:pulse 2s infinite;
}

@keyframes pulse{
  0%{transform:scale(1);opacity:.6}
  70%{transform:scale(2);opacity:0}
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px;
}

.label{font-size:11px;color:var(--muted)}
.value{font-size:26px;font-weight:600;margin-top:6px}

.bar{
  height:4px;background:#222;border-radius:4px;margin-top:10px;overflow:hidden
}
.bar > div{height:100%;width:0%;transition:.3s}

.cpu{background:var(--blue)}
.ram{background:var(--green)}
.disk{background:#888}
.temp{background:var(--orange)}
.power{background:#a87cff}

.layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:12px;
  margin-top:12px;
}

.events{
  font-size:12px;
  max-height:320px;
  overflow:auto;
}

.event{
  padding:8px 0;
  border-bottom:1px solid #222;
}

.event.warning{color:var(--orange)}
.event.error{color:var(--red)}
.event.info{color:var(--green)}

canvas{width:100%!important;height:260px!important}
</style>
</head>

<body>

<div class="wrap">

  <div class="header">
    <div>🖥️ Homelab</div>

    <div class="status">
      <div class="dot" id="dot"></div>
      <span id="status">conectando</span>
    </div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="label">CPU</div>
      <div class="value" id="cpu">—</div>
      <div class="bar"><div class="cpu" id="cpuBar"></div></div>
    </div>

    <div class="card">
      <div class="label">RAM</div>
      <div class="value" id="ram">—</div>
      <div class="bar"><div class="ram" id="ramBar"></div></div>
    </div>

    <div class="card">
      <div class="label">DISK</div>
      <div class="value" id="disk">—</div>
      <div class="bar"><div class="disk" id="diskBar"></div></div>
    </div>

    <div class="card">
      <div class="label">TEMP</div>
      <div class="value" id="temp">—</div>
      <div class="bar"><div class="temp" id="tempBar"></div></div>
    </div>

    <div class="card">
      <div class="label">POWER</div>
      <div class="value" id="power">—</div>
      <div class="bar"><div class="power" id="powerBar"></div></div>
    </div>

  </div>

  <div class="layout">

    <div class="card">
      <div class="label">Live Metrics</div>
      <canvas id="chart"></canvas>
    </div>

    <div class="card">
      <div class="label">Events</div>
      <div class="events" id="events"></div>
    </div>

  </div>

</div>

<script>
const MAX = 50;

const ctx = document.getElementById("chart");

const chart = new Chart(ctx, {
  type:"line",
  data:{
    labels:[],
    datasets:[
      {label:"CPU",data:[],borderColor:"#4d8dff",tension:.35},
      {label:"RAM",data:[],borderColor:"#3ecf8e",tension:.35}
    ]
  },
  options:{
    animation:false,
    responsive:true,
    scales:{y:{min:0,max:100}}
  }
});

function push(t,cpu,ram){
  chart.data.labels.push(t);
  chart.data.datasets[0].data.push(cpu);
  chart.data.datasets[1].data.push(ram);

  if(chart.data.labels.length>MAX){
    chart.data.labels.shift();
    chart.data.datasets.forEach(d=>d.data.shift());
  }

  chart.update("none");
}

function eventType(msg){
  if(msg.includes("CPU")) return "warning";
  if(msg.includes("RAM")) return "warning";
  if(msg.includes("Temp")) return "error";
  return "info";
}

function addEvent(msg){
  const el=document.getElementById("events");
  const div=document.createElement("div");
  div.className="event "+eventType(msg);
  div.textContent=msg;
  el.prepend(div);

  if(el.children.length>15) el.removeChild(el.lastChild);
}

// ---------------- WS ROBUSTO ----------------

let ws;
let retry=1000;

function connect(){

  ws = new WebSocket("ws://"+location.host+"/ws");

  ws.onopen=()=>{
    retry=1000;
    document.getElementById("status").textContent="online";
    document.getElementById("dot").style.background="#3ecf8e";
  };

  ws.onclose=()=>{
    document.getElementById("status").textContent="reconectando...";
    document.getElementById("dot").style.background="#f0a838";

    setTimeout(connect, retry);
    retry = Math.min(retry*1.5, 10000);
  };

  ws.onerror=()=>{
    ws.close();
  };

  ws.onmessage=(e)=>{
    const d=JSON.parse(e.data);
    const t=new Date(d.ts*1000).toLocaleTimeString();

    // valores
    cpu.textContent=d.cpu+"%";
    ram.textContent=d.ram+"%";
    disk.textContent=d.disk+"%";
    temp.textContent=d.temp??"—";
    power.textContent=d.power??"—";

    // barras
    cpuBar.style.width=d.cpu+"%";
    ramBar.style.width=d.ram+"%";
    diskBar.style.width=d.disk+"%";
    tempBar.style.width=(d.temp||0)+"%";
    powerBar.style.width=Math.min((d.power||0)*2,100)+"%";

    push(t,d.cpu,d.ram);

    if(d.alerts){
      d.alerts.forEach(addEvent);
    }
  };
}

connect();
</script>

</body>
</html>

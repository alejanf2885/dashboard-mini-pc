<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homelab Live</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body {
      background: #0a0a0b;
      color: #eaeaea;
      font-family: system-ui, sans-serif;
      margin: 0;
    }

    .wrap { max-width: 1100px; margin: auto; padding: 20px; }

    .grid { display: grid; gap: 12px; }
    .grid-5 { grid-template-columns: repeat(5, 1fr); }

    .card {
      background: #141418;
      border: 1px solid #24242a;
      border-radius: 12px;
      padding: 14px;
    }

    .label { font-size: 11px; opacity: 0.6; }
    .value { font-size: 26px; font-weight: 600; }

    .bar {
      height: 5px;
      background: #2a2a33;
      border-radius: 4px;
      margin-top: 10px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      width: 0%;
      transition: width .3s ease;
    }

    .cpu { background: #4d8dff; }
    .ram { background: #3ecf8e; }
    .temp { background: #f0a838; }
    .power { background: #a87cff; }

    .status {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 20px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ecf8e;
      box-shadow: 0 0 10px #3ecf8e;
    }

    .title {
      font-size: 18px;
      font-weight: 600;
    }

    .sub {
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>
<div class="wrap">

  <!-- HEADER -->
  <div class="status">
    <div class="dot"></div>
    <div>
      <div class="title">Homelab Live Dashboard</div>
      <div class="sub" id="statusText">conectando...</div>
    </div>
  </div>

  <!-- METRICS -->
  <div class="grid grid-5">

    <div class="card">
      <div class="label">CPU</div>
      <div class="value"><span id="cpu">--</span>%</div>
      <div class="bar"><div id="cpuBar" class="fill cpu"></div></div>
    </div>

    <div class="card">
      <div class="label">RAM</div>
      <div class="value"><span id="ram">--</span> GB</div>
      <div class="bar"><div id="ramBar" class="fill ram"></div></div>
    </div>

    <div class="card">
      <div class="label">TEMP</div>
      <div class="value"><span id="temp">--</span>°C</div>
      <div class="bar"><div id="tempBar" class="fill temp"></div></div>
    </div>

    <div class="card">
      <div class="label">POWER</div>
      <div class="value"><span id="power">--</span> W</div>
      <div class="bar"><div id="powerBar" class="fill power"></div></div>
    </div>

    <div class="card">
      <div class="label">STATUS</div>
      <div class="value" style="font-size:16px" id="liveStatus">WAIT</div>
    </div>

  </div>

</div>

<script>
const protocol = location.protocol === "https:" ? "wss" : "ws";
const ws = new WebSocket(`${protocol}://${location.host}/ws`);

ws.onopen = () => {
  document.getElementById("statusText").textContent = "conectado en tiempo real";
};

ws.onmessage = (event) => {
  const d = JSON.parse(event.data);

  // CPU
  document.getElementById("cpu").textContent = d.cpu ?? "--";
  document.getElementById("cpuBar").style.width = (d.cpu ?? 0) + "%";

  // RAM
  document.getElementById("ram").textContent = d.ram_used_gb ?? "--";
  document.getElementById("ramBar").style.width = (d.ram_pct ?? 0) + "%";

  // TEMP
  if (d.temp != null) {
    document.getElementById("temp").textContent = d.temp.toFixed(1);
    document.getElementById("tempBar").style.width = Math.min(d.temp, 100) + "%";
  }

  // POWER
  if (d.power != null) {
    document.getElementById("power").textContent = d.power;
    document.getElementById("powerBar").style.width = Math.min(d.power / 60 * 100, 100) + "%";
  }

  document.getElementById("liveStatus").textContent = "LIVE";
};

ws.onclose = () => {
  document.getElementById("statusText").textContent = "desconectado";
  document.getElementById("liveStatus").textContent = "OFF";
};
</script>

</body>
</html>
